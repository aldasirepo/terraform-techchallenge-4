apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: argocd
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "2.10.2"
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            enabled: false
          config:
            auth_enabled: false
            storage_config:
              boltdb_shipper:
                active_index_directory: /tmp/loki/index
                cache_location: /tmp/loki/index_cache
                shared_store: filesystem
              filesystem:
                directory: /tmp/loki/chunks
            schema_config:
              configs:
                - from: "2020-10-24"
                  store: boltdb-shipper
                  object_store: filesystem
                  schema: v11
                  index:
                    prefix: index_
                    period: 24h
        promtail:
          enabled: false
        grafana:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
