# Configuracoes otimizadas para EKS com t3.medium

# Grafana
grafana:
  enabled: true
  adminPassword: "admin123"
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    path: /grafana(/|$)(.*)
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true
  # Apenas Loki como datasource adicional (Prometheus ja e provisionado automaticamente)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc:3100
      access: proxy
  # Dashboard customizado ToggleMaster
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: togglemaster
          folder: ToggleMaster
          type: file
          options:
            path: /var/lib/grafana/dashboards/togglemaster
  dashboardsConfigMaps:
    togglemaster: togglemaster-dashboard

# Prometheus
prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        cpu: 200m
        memory: 400Mi
      limits:
        cpu: 500m
        memory: 800Mi
    storageSpec: {}

# AlertManager
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

# Node Exporter
nodeExporter:
  enabled: true

# Kube State Metrics
kubeStateMetrics:
  enabled: true

# Desabilitar alguns componentes para economizar recursos
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
