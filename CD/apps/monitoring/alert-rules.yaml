apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: togglemaster-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: togglemaster.rules
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{
              namespace=~"auth-service|flag-service|targeting-service|evaluation-service|analytics-service"
            }[5m]) * 60 > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} em CrashLoop"
            description: "O pod {{ $labels.pod }} no namespace {{ $labels.namespace }} está reiniciando."

        - alert: PodNotRunning
          expr: |
            kube_pod_status_phase{
              phase!="Running",
              namespace=~"auth-service|flag-service|targeting-service|evaluation-service|analytics-service"
            } == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} não está Running"
            description: "O pod {{ $labels.pod }} está em fase {{ $labels.phase }}."

        - alert: HighMemoryUsage
          expr: |
            (container_memory_working_set_bytes{
              namespace=~"auth-service|flag-service|targeting-service|evaluation-service|analytics-service",
              container!=""
            } / container_spec_memory_limit_bytes{container!=""}) * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Alto uso de memória em {{ $labels.pod }}"
            description: "O container {{ $labels.container }} está usando mais de 80% do limite de memória."
