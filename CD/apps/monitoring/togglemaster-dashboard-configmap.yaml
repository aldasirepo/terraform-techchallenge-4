apiVersion: v1
kind: ConfigMap
metadata:
  name: togglemaster-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  togglemaster-overview.json: |
    {
      "title": "ToggleMaster Overview",
      "uid": "togglemaster-overview",
      "version": 1,
      "schemaVersion": 16,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage por Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": "Prometheus",
          "targets": [{
            "expr": "100 - (avg by (node) (irate(node_cpu_seconds_total{mode='idle'}[5m])) * 100)",
            "legendFormat": "{{node}}"
          }]
        },
        {
          "id": 2,
          "title": "Memory Usage por Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": "Prometheus",
          "targets": [{
            "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
            "legendFormat": "{{instance}}"
          }]
        },
        {
          "id": 3,
          "title": "Pods Running por Namespace",
          "type": "stat",
          "gridPos": {"h": 4, "w": 24, "x": 0, "y": 8},
          "datasource": "Prometheus",
          "targets": [{
            "expr": "count by (namespace) (kube_pod_status_phase{phase='Running'})",
            "legendFormat": "{{namespace}}"
          }]
        },
        {
          "id": 4,
          "title": "Logs em Tempo Real",
          "type": "logs",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 12},
          "datasource": "Loki",
          "targets": [{
            "expr": "{namespace=~\"auth-service|flag-service|targeting-service|evaluation-service|analytics-service\"}",
            "legendFormat": ""
          }],
          "options": {
            "showTime": true,
            "showLabels": true,
            "wrapLogMessage": true
          }
        }
      ]
    }
